name: Workflow for deploying to production

on: [push, workflow_dispatch]

jobs:
  test-code:
    runs-on: ubuntu-latest
    steps:
      - name: copying code to the runner
        uses: actions/checkout@v4 #* to copy the code to the runner
      # - name: printing environment variables
      #   run: |
      #     pwd
      #     ls -la
      #     node -v
      #     git -v
      #     echo $GITHUB_WORKFLOW
      - name: installing nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
      # - name: checking node version
      #   run: node -v

      - name: installing dependencies
        run: npm install --frozen-lockfile # * frozen lockfile ensures that the exact versions in package-lock.json are installed for consistency across environments

      - name: running tests
        run: npm run start

  build-code:
    runs-on: ubuntu-latest
    needs: test-code
    steps:
      - name: installing nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0

      - name: installing dependencies
        run: npm install --frozen-lockfile

      - name: building the code
        run: npm run dev

  deploy-code:
    needs: build-code
    runs-on: ubuntu-latest
    steps:
      - name: deploging the code
        run: echo "Deploying the code to production environment"
